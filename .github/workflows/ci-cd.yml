name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY:        ${{ secrets.ACR_LOGIN_SERVER }}
  DOTNET_VERSION:  '8.0.x'
  NODE_VERSION:    '20.x'

jobs:

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1: Run all tests
# ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SystemMonitor.sln

      - name: Build solution
        run: dotnet build SystemMonitor.sln --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test src/SystemMonitor.Tests/SystemMonitor.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./test-results \
            --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name:    .NET Tests
          path:    ./test-results/*.trx
          reporter: dotnet-trx

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-results/**/coverage.cobertura.xml

      - name: Build Vue dashboard
        run: |
          cd src/dashboard
          npm ci
          npm run build

# ──────────────────────────────────────────────────────────────────────────────
# JOB 2: Security scan (runs on every push)
# ──────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:    fs
          scan-ref:     .
          severity:     CRITICAL,HIGH
          exit-code:    '1'
          format:       sarif
          output:       trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

# ──────────────────────────────────────────────────────────────────────────────
# JOB 3: Build and push Docker images to Azure Container Registry
#         Only runs on pushes to main or develop
# ──────────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    strategy:
      matrix:
        include:
          - service:    api
            dockerfile: src/SystemMonitor.Api/Dockerfile
            image:      sysmon-api
          - service:    worker
            dockerfile: src/SystemMonitor.Worker/Dockerfile
            image:      sysmon-worker
          - service:    ai-service
            dockerfile: src/SystemMonitor.AiService/Dockerfile
            image:      sysmon-ai
          - service:    agent
            dockerfile: src/SystemMonitor.Agent/Dockerfile
            image:      sysmon-agent
          - service:    dashboard
            dockerfile: src/dashboard/Dockerfile
            image:      sysmon-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       ${{ matrix.dockerfile }}
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

# ──────────────────────────────────────────────────────────────────────────────
# JOB 4: Deploy to AKS staging environment (develop branch)
# ──────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url:  https://staging.monitor.yourdomain.com

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context (staging)
        uses: azure/aks-set-context@v4
        with:
          resource-group: sysmon-staging-rg
          cluster-name:   sysmon-aks-staging

      - name: Update image tags in manifests
        run: |
          IMAGE_TAG=sha-${{ github.sha }}
          sed -i "s|:latest|:${IMAGE_TAG}|g" infra/k8s/*.yaml

      - name: Deploy to staging namespace
        run: |
          kubectl apply -f infra/k8s/ -n sysmon-staging
          kubectl rollout status deployment/api-service    -n sysmon-staging --timeout=120s
          kubectl rollout status deployment/worker         -n sysmon-staging --timeout=120s
          kubectl rollout status deployment/ai-service     -n sysmon-staging --timeout=120s
          kubectl rollout status deployment/dashboard      -n sysmon-staging --timeout=120s

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://staging.monitor.yourdomain.com"
          curl -f "$STAGING_URL/api/v1/health"         || exit 1
          curl -f "$STAGING_URL/api/v1/schema/canonical" | jq '.[] | .name' | head -5

# ──────────────────────────────────────────────────────────────────────────────
# JOB 5: Deploy to AKS production (main branch, requires approval)
# ──────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url:  https://monitor.yourdomain.com

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context (production)
        uses: azure/aks-set-context@v4
        with:
          resource-group: sysmon-prod-rg
          cluster-name:   sysmon-aks-prod

      - name: Update image tags
        run: |
          IMAGE_TAG=sha-${{ github.sha }}
          sed -i "s|:latest|:${IMAGE_TAG}|g" infra/k8s/*.yaml

      - name: Deploy to production (rolling update, zero-downtime)
        run: |
          kubectl apply -f infra/k8s/ -n sysmon
          kubectl rollout status deployment/api-service -n sysmon --timeout=300s
          kubectl rollout status deployment/worker      -n sysmon --timeout=300s
          kubectl rollout status deployment/ai-service  -n sysmon --timeout=300s
          kubectl rollout status deployment/dashboard   -n sysmon --timeout=300s

      - name: Verify production health
        run: |
          sleep 15
          curl -f "https://monitor.yourdomain.com/api/v1/health" || \
          (kubectl rollout undo deployment/api-service -n sysmon && exit 1)

      - name: Tag release in Git
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git tag "release-$(date +%Y%m%d-%H%M%S)"
          git push --tags
